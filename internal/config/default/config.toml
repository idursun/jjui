limit = 0

[keys]
  up = ["up", "k"]
  down = ["down", "j"]
  scroll_up = ["pgup"]
  scroll_down = ["pgdown"]
  jump_to_parent = ["J"]
  jump_to_children = ["K"]
  jump_to_working_copy = ["@"]
  apply = ["enter"]
  force_apply = ["alt+enter"]
  cancel = ["esc"]
  toggle_select = [" "]
  new = ["n"]
  commit = ["c"]
  refresh = ["ctrl+r"]
  abandon = ["a"]
  diff = ["d"]
  quit = ["q"]
  help = ["?"]
  describe = ["D"]
  edit = ["e"]
  force_edit = ["alt+e"]
  diffedit = ["E"]
  absorb = ["A"]
  split = ["s"]
  split_parallel = ["alt+s"]
  undo = ["u"]
  redo = ["U"]
  revset = ["L"]
  exec_jj = [":"]
  exec_shell = ["$"]
  ace_jump = ["f"]
  quick_search = ["/"]
  quick_search_cycle = ["'"]
  custom_commands = ["x"]
  suspend = ["ctrl+z"]
  set_parents = ["M"]
  [keys.rebase]
    mode = ["r"]
    revision = ["r"]
    source = ["s"]
    branch = ["B"]
    after = ["a"]
    before = ["b"]
    onto = ["d"]
    insert = ["i"]
    skip_emptied = ["e"]
  [keys.revert]
    mode = ["R"]
    after = ["a"]
    before = ["b"]
    onto = ["d"]
    insert = ["i"]
  [keys.duplicate]
    mode = ["y"]
    after = ["a"]
    before = ["b"]
    onto = ["d"]
  [keys.squash]
    mode = ["S"]
    keep_emptied = ["e"]
    use_destination_message = ["d"]
    interactive = ["i"]
  [keys.details]
    mode = ["l"]
    close = ["h"]
    split = ["s"]
    split_parallel = ["alt+s"]
    squash = ["S"]
    restore = ["r"]
    absorb = ["A"]
    diff = ["d"]
    select = ["m", " "]
    revisions_changing_file = ["*"]
  [keys.evolog]
    mode = ["v"]
    diff = ["d"]
    restore = ["r"]
  [keys.preview]
    mode = ["p"]
    toggle_bottom = ["P"]
    scroll_up = ["ctrl+p"]
    scroll_down = ["ctrl+n"]
    half_page_down = ["ctrl+d"]
    half_page_up = ["ctrl+u"]
    expand = ["ctrl+h"]
    shrink = ["ctrl+l"]
  [keys.bookmark]
    mode = ["b"]
    set = ["B"]
    delete = ["d"]
    move = ["m"]
    forget = ["f"]
    track = ["t"]
    untrack = ["u"]
  [keys.inline_describe]
    mode = ["enter"]
    accept = ["alt+enter", "ctrl+s"]
    editor = ["alt+e"]
  [keys.git]
    mode = ["g"]
    push = ["p"]
    fetch = ["f"]
  [keys.oplog]
    mode = ["o"]
    restore = ["r"]
    revert = ["R"]
  [keys.file_search]
    toggle = ["ctrl+t"]
    up = ["up"]
    down = ["down"]
    accept = ["enter"]
    edit = ["alt+e"]
[ui]
  theme = ""
  auto_refresh_interval = 0
  [ui.tracer]
    enabled = false
  [ui.colors]

[suggest]
  [suggest.exec]
    mode = "off"

[revisions]
  log_batching = true
  log_batch_size = 50
  # template = 'builtin_log_compact' # overrides jj's templates.log
  # revset = "zzzzzzz"               # overrides jj's revsets.log

[preview]
  revision_command = ["show", "--color", "always", "-r", "$change_id"]
  oplog_command = ["op", "show", "$operation_id", "--color", "always"]
  file_command = ["diff", "--color", "always", "-r", "$change_id", "$file"]
  position = "auto"
  show_at_start = false
  width_percentage = 50.0
  width_increment_percentage = 5.0

[oplog]
  limit = 200

[git]
  default_remote = "origin"

[ssh]
  hijack_askpass = false

[[keybindings]]
keys = ["n"]
action = "revisions.new"
when = "revisions"

[[keybindings]]
keys = ["p"]
action = "preview.toggle"
when = "revisions"

[[keybindings]]
keys = ["E"]
action = "revisions.diffedit"
when = "revisions"

[[keybindings]]
keys = ["j"]
action = "revisions.down"
when = "revisions || rebase || squash || duplicate"

[[keybindings]]
keys = ["k"]
action = "revisions.up"
when = "revisions || rebase || squash || duplicate"

[[keybindings]]
keys = ["y"]
action = "copy_files_to_clipboard"
when = "details"

[[keybindings]]
keys = ["@"]
action = "revisions.navigate_to_working_copy"
when = "revisions"

[[keybindings]]
keys = ["J"]
action = "revisions.navigate_to_parent"
when = "revisions"

[[keybindings]]
keys = ["K"]
action = "revisions.navigate_to_children"
when = "revisions"

[actions."revisions.new"]
lua = '''
local checked = revisions.checked()
if next(checked) then
  jj_async("new", unpack(checked))
else
  jj_async("new", revisions.current())
end
revisions.refresh()
revisions.navigate{to="@"}
'''

[actions."revisions.diffedit"]
lua = '''
jj_interactive("diffedit", "-r", revisions.current())
revisions.refresh()
'''

[actions."preview.toggle"]
lua = '''
jjui.preview.toggle_visible()
'''